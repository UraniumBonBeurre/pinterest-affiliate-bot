name: Daily Pinterest Autopilot

on:
  schedule:
    # Run every day at 12:00 UTC (We will use sleep to randomize the exact time)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manually triggering the workflow

jobs:
  run-autopilot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Randomize Start Time
        if: github.event_name == 'schedule'
        run: |
          # Sleep for a random amount of time between 0 and 6 hours (up to 360 minutes) to avoid exact cron patterns on Pinterest
          DELAY=$((RANDOM % 21600))
          echo "Sleeping for $DELAY seconds to humanize execution time..."
          sleep $DELAY

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Autopilot Main Script
        id: autopilot
        env:
          PINS_PER_DAY: 5
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_HASH: ${{ secrets.R2_PUBLIC_HASH }}
        run: |
          python src/autopilot.py
          
      - name: Commit Updated ASIN Pool
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/pins_ideas_to_fill.csv
          git commit -m "Auto-update ASIN pool (deleted used rows)" || echo "No changes to commit"
          git push
          
      - name: Create Low Pool Issue
        if: steps.autopilot.outputs.pool_low == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "URGENT : Réserve ASIN déco presque vide (< 50)" \
            --body "Le script Autopilot a détecté qu'il restait moins de 50 ASINs non utilisés dans data/pins_ideas_to_fill.csv. Relancez la génération locale pour refaire le plein de produits !"
