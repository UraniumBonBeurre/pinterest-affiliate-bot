name: Daily Pinterest Autopilot

on:
  schedule:
    # Run every 3 hours (8 times a day)
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:
    inputs:
      pins_count:
        description: 'Nombre de pins à publier (par exécution)'
        required: true
        default: '1'
        type: string
      publish_sandbox:
        description: 'Publier sur Pinterest (Mode SANDBOX - tests)'
        required: true
        default: false
        type: boolean
      publish_production:
        description: 'Publier sur Pinterest (Mode PRODUCTION - vrai compte)'
        required: true
        default: false
        type: boolean

env:
  CRON_PUBLISH_MODE: 'production' # Modifié automatiquement par toggle_autopilot.sh. Valeurs: 'sandbox', 'production'


jobs:
  run-autopilot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Randomize Start Time
        if: github.event_name == 'schedule'
        run: |
          # Sleep for a random amount of time between 0 and 2 hours (up to 7200 seconds) 
          # to spread the execution within the 3-hour cron window.
          DELAY=$((RANDOM % 7200))
          echo "Sleeping for $DELAY seconds to humanize execution time..."
          sleep $DELAY

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Determine Publish Mode
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.publish_production }}" == "true" ] && [ "${{ github.event.inputs.publish_sandbox }}" == "true" ]; then
              echo "❌ Error: Cannot select both Sandbox and Production modes."
              exit 1
            elif [ "${{ github.event.inputs.publish_production }}" == "true" ]; then
              echo "PUBLISH_DRY_RUN=false" >> $GITHUB_ENV
              echo "PINTEREST_API_BASE=https://api.pinterest.com/v5" >> $GITHUB_ENV
              echo "Mode: Production"
            elif [ "${{ github.event.inputs.publish_sandbox }}" == "true" ]; then
              echo "PUBLISH_DRY_RUN=false" >> $GITHUB_ENV
              echo "PINTEREST_API_BASE=https://api-sandbox.pinterest.com/v5" >> $GITHUB_ENV
              echo "Mode: Sandbox"
            else
              echo "PUBLISH_DRY_RUN=true" >> $GITHUB_ENV
              echo "PINTEREST_API_BASE=https://api-sandbox.pinterest.com/v5" >> $GITHUB_ENV
              echo "Mode: Dry Run"
            fi
          else
            # Scheduled run via CRON
            if [ "${{ env.CRON_PUBLISH_MODE }}" == "production" ]; then
              echo "PUBLISH_DRY_RUN=false" >> $GITHUB_ENV
              echo "PINTEREST_API_BASE=https://api.pinterest.com/v5" >> $GITHUB_ENV
              echo "Mode: Cron Production"
            elif [ "${{ env.CRON_PUBLISH_MODE }}" == "sandbox" ]; then
              echo "PUBLISH_DRY_RUN=false" >> $GITHUB_ENV
              echo "PINTEREST_API_BASE=https://api-sandbox.pinterest.com/v5" >> $GITHUB_ENV
              echo "Mode: Cron Sandbox"
            else
              echo "PUBLISH_DRY_RUN=true" >> $GITHUB_ENV
              echo "PINTEREST_API_BASE=https://api-sandbox.pinterest.com/v5" >> $GITHUB_ENV
              echo "Mode: Cron Dry Run"
            fi
          fi

      - name: 🔍 Debug — Pinterest config
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
        run: |
          echo "API Base URL: $PINTEREST_API_BASE"
          echo "Dry Run: $PUBLISH_DRY_RUN"
          TOKEN_PREFIX="${PINTEREST_ACCESS_TOKEN:0:12}..."
          echo "Token prefix (first 12 chars): $TOKEN_PREFIX"
          if [ -z "$PINTEREST_ACCESS_TOKEN" ]; then
            echo "❌ PINTEREST_ACCESS_TOKEN is EMPTY — set it in GitHub Secrets!"
          else
            echo "✅ Token is present."
          fi

      - name: Run Autopilot Main Script
        id: autopilot
        env:
          PINS_PER_DAY: ${{ github.event.inputs.pins_count || '1' }}
          # PUBLISH_DRY_RUN and PINTEREST_API_BASE are injected via $GITHUB_ENV from previous step
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_HASH: ${{ secrets.R2_PUBLIC_HASH }}
        run: |
          python src/autopilot.py

      - name: Commit Updated ASIN Pool
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/pins_ideas_to_fill.csv
          git commit -m "Auto-update ASIN pool (deleted used rows)" || echo "No changes to commit"
          # Pull with rebase in case local pushes happened during the run
          git pull --rebase origin master || true
          git push
          
      - name: Create Low Pool Issue
        if: steps.autopilot.outputs.pool_low == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "URGENT : Réserve ASIN déco presque vide (< 50)" \
            --body "Le script Autopilot a détecté qu'il restait moins de 50 ASINs non utilisés dans data/pins_ideas_to_fill.csv. Relancez la génération locale pour refaire le plein de produits !"
